<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Jeopardy</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lodash/lodash.min.js"></script>

  <script defer src="jeopardy.js"></script>
</head>

<body>

  <h1>Jeopardy!</h1>

  <button id="restart">Start / Restart</button>

  <!-- Question and Answer Boxes -->
  <div id="qa-container">
    <div id="question-box">Question will appear here</div>
    <div id="answer-box">Answer will appear here</div>
  </div>

  <!-- Game Board -->
  <table id="jeopardy">
    <thead></thead>
    <tbody></tbody>
  </table>

  <!-- Optional Music -->
  <audio id="jeopardy-music" loop>
    <source src="jeopardy-theme.mp3" type="audio/mpeg">
  </audio>

</body>

</html>
